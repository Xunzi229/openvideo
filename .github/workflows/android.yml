name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug-verification:
    name: Debug verification
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2

      - name: Run debug unit tests
        run: .\gradlew.bat :app:testDebugUnitTest --warning-mode fail

      - name: Build debug APK
        run: .\gradlew.bat :app:assembleDebug --warning-mode fail

      - name: Run debug lint
        run: .\gradlew.bat :app:lintDebug --warning-mode fail
