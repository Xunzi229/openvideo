<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竖屏播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .phone {
    width: 390px;
    min-height: 844px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 6px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
  }

  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    padding: 52px 16px 10px;
    gap: 10px;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  }

  .back-btn { color: #fff; cursor: pointer; display: flex; align-items: center; }

  .title {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    flex: 1;
  }

  .badge-4k {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .top-right { display: flex; align-items: center; gap: 16px; color: #fff; }

  .tv-badge {
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }

  /* Video area */
  .video-area {
    width: 100%;
    height: 580px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .scene-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Overlay controls on video */
  .video-overlays {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  .lock-btn {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 42px; height: 42px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    pointer-events: all;
    cursor: pointer;
  }

  .speed-btn {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-20px);
    background: rgba(0,0,0,0.55);
    border-radius: 20px;
    padding: 8px 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    pointer-events: all;
    cursor: pointer;
  }

  .fullscreen-btn {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(28px);
    width: 42px; height: 42px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    pointer-events: all;
    cursor: pointer;
  }

  /* Controls area below video */
  .controls-area {
    background: #0a0a0a;
    padding: 16px 20px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .time { color: #fff; font-size: 13px; font-weight: 500; white-space: nowrap; min-width: 38px; }
  .time.end { text-align: right; }

  .progress-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 27.4%;
    background: #4a90e2;
    border-radius: 2px;
  }

  .progress-thumb {
    position: absolute;
    left: 27.4%; top: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 5px rgba(0,0,0,0.5);
  }

  /* Playback controls */
  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    margin-bottom: 24px;
  }

  .ctrl-btn { color: rgba(255,255,255,0.9); cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .play-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    cursor: pointer;
  }

  /* Bottom function row */
  .func-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0 16px;
    border-top: 1px solid #1a1a1a;
  }

  .func-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
  }

  .func-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.8);
  }

  /* Home indicator */
  .home-indicator {
    display: flex;
    justify-content: center;
    padding: 8px 0 10px;
  }

  .home-bar {
    width: 130px;
    height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span>10:30</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 20 16" fill="white">
        <rect x="0" y="10" width="4" height="6" rx="1"/>
        <rect x="5.5" y="7" width="4" height="9" rx="1"/>
        <rect x="11" y="3.5" width="4" height="12.5" rx="1"/>
        <rect x="16.5" y="0" width="3.5" height="16" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 24 18" fill="white">
        <path d="M12 14.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
        <path d="M7.5 11.5C8.9 10.1 10.4 9.5 12 9.5s3.1.6 4.5 2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M4 8C6.5 5.5 9.1 4 12 4s5.5 1.5 8 4" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M1 4.5C4.3 1.7 7.9 0 12 0s7.7 1.7 11 4.5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 30 14" fill="none">
        <rect x="0" y="1" width="26" height="12" rx="3" stroke="white" stroke-width="1.5"/>
        <rect x="1.5" y="2.5" width="21" height="9" rx="2" fill="white"/>
        <path d="M27 4.5v5a2 2 0 0 0 0-5z" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="back-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <span class="title">阿尔卑斯山的日出</span>
    <span class="badge-4k">4K</span>
    <div style="flex:1"></div>
    <div class="top-right">
      <div style="cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8.5C6.5 8.5 10.5 10.5 13 14"/>
          <path d="M2 13c3 0 5.5 1.5 7 4"/>
          <circle cx="2" cy="19" r="1.5" fill="white" stroke="none"/>
          <path d="M22 6H10a2 2 0 0 0-2 2v3"/>
          <path d="M22 6v12H14"/>
        </svg>
      </div>
      <span class="tv-badge">TV</span>
      <div style="cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Video area with SVG scene -->
  <div class="video-area">
    <svg class="scene-svg" viewBox="0 0 390 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a1035"/>
          <stop offset="12%" stop-color="#2e1850"/>
          <stop offset="22%" stop-color="#5a2868"/>
          <stop offset="32%" stop-color="#9a4060"/>
          <stop offset="40%" stop-color="#d06048"/>
          <stop offset="46%" stop-color="#e88840"/>
          <stop offset="50%" stop-color="#f5b840"/>
          <stop offset="54%" stop-color="#f08838"/>
          <stop offset="62%" stop-color="#c05030"/>
          <stop offset="72%" stop-color="#703050"/>
          <stop offset="85%" stop-color="#3a2048"/>
          <stop offset="100%" stop-color="#201228"/>
        </linearGradient>
        <radialGradient id="vsun" cx="50%" cy="54%" r="15%">
          <stop offset="0%" stop-color="#fff8d0"/>
          <stop offset="25%" stop-color="#ffd050" stop-opacity="1"/>
          <stop offset="60%" stop-color="#ff8030" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#ff4020" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="vglow" cx="50%" cy="54%" r="40%">
          <stop offset="0%" stop-color="#ffb030" stop-opacity="0.7"/>
          <stop offset="50%" stop-color="#ff6020" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#ff4020" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="vlake" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#503828" stop-opacity="0.8"/>
          <stop offset="30%" stop-color="#3a2848" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#120a1a" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="vrock" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a2018"/>
          <stop offset="100%" stop-color="#100c08"/>
        </linearGradient>
        <filter id="vblur">
          <feGaussianBlur stdDeviation="3"/>
        </filter>
        <filter id="vblur2">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>

      <!-- Sky -->
      <rect width="390" height="580" fill="url(#vsky)"/>

      <!-- Sun halo -->
      <ellipse cx="195" cy="312" rx="160" ry="100" fill="url(#vglow)" filter="url(#vblur2)"/>
      <circle cx="195" cy="312" r="60" fill="url(#vsun)" filter="url(#vblur)"/>
      <circle cx="195" cy="312" r="22" fill="#fff8d0"/>

      <!-- Clouds top area -->
      <g opacity="0.6" fill="#c07050" filter="url(#vblur)">
        <ellipse cx="60" cy="60" rx="70" ry="22"/>
        <ellipse cx="150" cy="45" rx="55" ry="18"/>
        <ellipse cx="50" cy="85" rx="45" ry="15"/>
        <ellipse cx="200" cy="35" rx="50" ry="16"/>
      </g>
      <g opacity="0.55" fill="#c06858" filter="url(#vblur)">
        <ellipse cx="330" cy="55" rx="65" ry="20"/>
        <ellipse cx="390" cy="42" rx="50" ry="16"/>
        <ellipse cx="300" cy="80" rx="55" ry="18"/>
        <ellipse cx="380" cy="75" rx="40" ry="14"/>
      </g>
      <!-- Mid clouds -->
      <g opacity="0.5" fill="#d07048" filter="url(#vblur)">
        <ellipse cx="80" cy="140" rx="80" ry="22"/>
        <ellipse cx="200" cy="120" rx="70" ry="18"/>
        <ellipse cx="320" cy="135" rx="75" ry="20"/>
        <ellipse cx="150" cy="160" rx="55" ry="15"/>
        <ellipse cx="280" cy="155" rx="50" ry="14"/>
      </g>
      <!-- Lower clouds near sun -->
      <g opacity="0.4" fill="#e07840" filter="url(#vblur)">
        <ellipse cx="60" cy="220" rx="90" ry="18"/>
        <ellipse cx="330" cy="210" rx="85" ry="18"/>
        <ellipse cx="150" cy="240" rx="60" ry="14"/>
        <ellipse cx="260" cy="235" rx="65" ry="14"/>
      </g>

      <!-- Left mountain far -->
      <polygon points="0,400 60,220 120,300 180,260 230,340 100,400" fill="#2a1c30" opacity="0.95"/>
      <polygon points="60,220 45,265 80,250 100,275 80,220" fill="#c8bca8" opacity="0.45"/>
      <!-- Left mountain near -->
      <polygon points="0,420 50,310 100,360 130,320 160,380 80,420" fill="#1e1428" opacity="0.9"/>

      <!-- Right mountain far -->
      <polygon points="390,400 330,225 270,305 210,262 160,342 290,400" fill="#2a1c30" opacity="0.95"/>
      <polygon points="330,225 345,270 310,255 290,278 310,225" fill="#c8bca8" opacity="0.45"/>
      <!-- Right mountain near -->
      <polygon points="390,420 340,315 290,365 260,325 230,382 310,420" fill="#1e1428" opacity="0.9"/>

      <!-- Mountain base / horizon -->
      <path d="M0,400 Q50,380 100,395 Q140,410 180,395 Q195,390 210,395 Q250,408 290,395 Q340,382 390,398 L390,420 L0,420Z" fill="#181028" opacity="0.95"/>

      <!-- Lake surface -->
      <rect x="0" y="395" width="390" height="185" fill="url(#vlake)"/>

      <!-- Sun reflection on lake -->
      <ellipse cx="195" cy="430" rx="18" ry="60" fill="#f5c040" opacity="0.4" filter="url(#vblur)"/>
      <rect x="190" y="395" width="10" height="130" fill="#f5d050" opacity="0.25" filter="url(#vblur)"/>

      <!-- Lake ripples -->
      <g stroke="rgba(180,130,80,0.12)" stroke-width="1" fill="none">
        <ellipse cx="195" cy="415" rx="60" ry="5"/>
        <ellipse cx="195" cy="435" rx="100" ry="6"/>
        <ellipse cx="195" cy="455" rx="140" ry="7"/>
        <ellipse cx="195" cy="480" rx="170" ry="7"/>
        <ellipse cx="195" cy="510" rx="180" ry="6"/>
        <line x1="0" y1="540" x2="390" y2="540"/>
        <line x1="0" y1="560" x2="390" y2="560"/>
      </g>

      <!-- Rock in foreground -->
      <ellipse cx="195" cy="525" rx="65" ry="28" fill="url(#vrock)"/>
      <ellipse cx="195" cy="520" rx="60" ry="20" fill="#201814"/>

      <!-- Sitting figure on rock -->
      <g>
        <!-- Body -->
        <ellipse cx="195" cy="502" rx="20" ry="15" fill="#1a0a06"/>
        <!-- Red jacket -->
        <ellipse cx="195" cy="504" rx="22" ry="13" fill="#8a1a0a"/>
        <!-- Head with hood -->
        <circle cx="195" cy="487" r="12" fill="#1a0a06"/>
        <ellipse cx="195" cy="488" rx="14" ry="10" fill="#2a1008"/>
        <!-- Hood -->
        <ellipse cx="195" cy="484" rx="13" ry="8" fill="#1a0806"/>
        <!-- Legs -->
        <ellipse cx="183" cy="516" rx="13" ry="6" fill="#220e08" transform="rotate(-10,183,516)"/>
        <ellipse cx="207" cy="516" rx="13" ry="6" fill="#220e08" transform="rotate(10,207,516)"/>
      </g>

      <!-- Bottom dark gradient overlay -->
      <rect x="0" y="480" width="390" height="100" fill="rgba(0,0,0,0.5)"/>
      <!-- Top gradient for top bar -->
      <rect x="0" y="0" width="390" height="100" fill="rgba(0,0,0,0.55)"/>
    </svg>

    <!-- Video overlays -->
    <div class="video-overlays">
      <!-- Lock -->
      <div class="lock-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="11" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      </div>
      <!-- Speed -->
      <div class="speed-btn">1.0x</div>
      <!-- Fullscreen -->
      <div class="fullscreen-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Controls below video -->
  <div class="controls-area">
    <!-- Progress -->
    <div class="progress-row">
      <span class="time">12:34</span>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <span class="time end">45:10</span>
    </div>

    <!-- Playback -->
    <div class="playback-controls">
      <!-- Rewind 10 -->
      <div class="ctrl-btn">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
          <text x="8.5" y="15.5" font-size="5.5" fill="white" stroke="none" font-family="sans-serif" font-weight="bold">10</text>
        </svg>
      </div>
      <!-- Prev -->
      <div class="ctrl-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
          <polygon points="19 20 9 12 19 4 19 20"/>
          <line x1="5" y1="19" x2="5" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <!-- Pause -->
      <div class="play-btn" id="playBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </div>
      <!-- Next -->
      <div class="ctrl-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <!-- Forward 10 -->
      <div class="ctrl-btn">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <text x="8.5" y="15.5" font-size="5.5" fill="white" stroke="none" font-family="sans-serif" font-weight="bold">10</text>
        </svg>
      </div>
    </div>

    <!-- Function row -->
    <div class="func-row">
      <!-- 倍速 -->
      <div class="func-item">
        <div class="func-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span>倍速</span>
      </div>
      <!-- 清晰度 -->
      <div class="func-item">
        <div class="func-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <text x="6" y="16" font-size="7" fill="rgba(255,255,255,0.8)" stroke="none" font-weight="bold" font-family="sans-serif">4K</text>
          </svg>
        </div>
        <span>清晰度</span>
      </div>
      <!-- 选集 -->
      <div class="func-item">
        <div class="func-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <path d="M3 10l2-2-2-2"/><circle cx="3" cy="18" r="1.5" fill="rgba(255,255,255,0.8)" stroke="none"/>
          </svg>
        </div>
        <span>选集</span>
      </div>
      <!-- 字幕 -->
      <div class="func-item">
        <div class="func-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <text x="5.5" y="15.5" font-size="7" fill="rgba(255,255,255,0.8)" stroke="none" font-weight="bold" font-family="sans-serif">CC</text>
          </svg>
        </div>
        <span>字幕</span>
      </div>
      <!-- 更多 -->
      <div class="func-item">
        <div class="func-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <circle cx="12" cy="12" r="2" fill="rgba(255,255,255,0.8)" stroke="none"/>
          </svg>
        </div>
        <span>更多</span>
      </div>
    </div>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>

</div>

<script>
  // Play/pause toggle
  const playBtn = document.getElementById('playBtn');
  let playing = true;
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.innerHTML = playing
      ? `<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`
      : `<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  });

  // Progress click
  const track = document.getElementById('progressTrack');
  const fill = document.getElementById('progressFill');
  const thumb = document.getElementById('progressThumb');
  track.addEventListener('click', (e) => {
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    fill.style.width = (pct * 100) + '%';
    thumb.style.left = (pct * 100) + '%';
  });

  // Speed cycle
  const speedBtn = document.querySelector('.speed-btn');
  const speeds = ['0.5x','0.75x','1.0x','1.25x','1.5x','2.0x'];
  let si = 2;
  speedBtn.addEventListener('click', () => {
    si = (si + 1) % speeds.length;
    speedBtn.textContent = speeds[si];
  });
</script>
</body>
</html>
