<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播放器设置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .settings-container {
    width: 900px;
    background: #161b22;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 24px;
    color: #e6edf3;
    font-size: 18px;
    font-weight: 600;
  }

  .back-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #8b949e;
  }

  /* Body: sidebar + content */
  .body {
    display: flex;
    flex: 1;
    padding: 0 0 20px 0;
  }

  /* Sidebar */
  .sidebar {
    width: 200px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    color: #8b949e;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.06);
    color: #c9d1d9;
  }

  .nav-item.active {
    background: #1f6feb;
    color: #fff;
  }

  .nav-item svg {
    flex-shrink: 0;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 0 20px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .section {
    background: #1c2128;
    border-radius: 12px;
    overflow: hidden;
  }

  .section-title {
    padding: 14px 18px 10px;
    font-size: 13px;
    color: #8b949e;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .setting-row {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-top: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
  }

  .setting-row:first-of-type {
    border-top: none;
  }

  .setting-label {
    flex: 1;
    color: #e6edf3;
    font-size: 15px;
  }

  .setting-sub {
    font-size: 12px;
    color: #8b949e;
    margin-top: 3px;
  }

  .setting-value {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #8b949e;
    font-size: 14px;
  }

  .chevron {
    color: #8b949e;
    font-size: 14px;
  }

  /* Speed buttons */
  .speed-buttons {
    display: flex;
    gap: 4px;
    background: #0d1117;
    border-radius: 8px;
    padding: 3px;
  }

  .speed-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #8b949e;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .speed-btn:hover {
    color: #c9d1d9;
    background: rgba(255,255,255,0.06);
  }

  .speed-btn.active {
    background: #1f6feb;
    color: #fff;
    font-weight: 500;
  }

  /* Toggle */
  .toggle {
    width: 46px;
    height: 26px;
    border-radius: 13px;
    background: #30363d;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on {
    background: #1f6feb;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .toggle.on::after {
    transform: translateX(20px);
  }

  /* Footer */
  .footer {
    padding: 12px 24px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1f6feb;
    font-size: 14px;
    cursor: pointer;
  }

  .footer:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="settings-container">
  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    播放器设置
  </div>

  <div class="body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8"/>
        </svg>
        播放
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        画面
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        声音
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        字幕
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
          <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/>
          <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
          <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
        </svg>
        手势
      </div>
      <div class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        其他
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- 播放控制 -->
      <div class="section">
        <div class="section-title">播放控制</div>

        <div class="setting-row">
          <div class="setting-label">播放速度</div>
          <div class="speed-buttons">
            <button class="speed-btn">0.5x</button>
            <button class="speed-btn">0.75x</button>
            <button class="speed-btn active">1.0x</button>
            <button class="speed-btn">1.25x</button>
            <button class="speed-btn">1.5x</button>
            <button class="speed-btn">2.0x</button>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">循环播放</div>
          <div class="setting-value">
            列表循环
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">跳过片头片尾</div>
          <div class="setting-value">
            开启
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">快进/快退间隔</div>
          <div class="setting-value">
            10 秒
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            记住播放进度
            <div class="setting-sub">自动记录上次播放位置</div>
          </div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <!-- 播放选项 -->
      <div class="section">
        <div class="section-title">播放选项</div>

        <div class="setting-row">
          <div class="setting-label">播放时启用硬件加速</div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="setting-row">
          <div class="setting-label">退出时自动暂停</div>
          <div class="toggle" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="setting-row">
          <div class="setting-label">切换下一集时自动播放</div>
          <div class="toggle on" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="setting-row">
          <div class="setting-label">
            后台播放（画面播放）
            <div class="setting-sub">切换到后台时，继续播放音频</div>
          </div>
          <div class="toggle" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    恢复默认设置
  </div>
</div>

<script>
  // Speed button interaction
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Nav item interaction
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
    });
  });
</script>
</body>
</html>
